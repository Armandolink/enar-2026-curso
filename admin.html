<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ENAR 2026 · Panel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--teal:#1D9E75;--teal-d:#0F6E56;--teal-l:#E1F5EE;--slate:#0F1923;--red:#c0392b;--red-l:#fdecea;--border:#e2e6ea;--bg:#f4f6f9;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:#111;min-height:100vh;}
/* ─── Login overlay ─── */
#login-overlay{position:fixed;inset:0;background:rgba(15,25,35,0.92);z-index:999;
  display:flex;align-items:center;justify-content:center;}
.login-box{background:#fff;border-radius:18px;padding:32px 28px;width:360px;
  box-shadow:0 24px 70px rgba(0,0,0,0.5);}
.login-box h2{font-size:16px;font-weight:800;color:#0F1923;margin-bottom:4px;}
.login-box p{font-size:11px;color:#999;margin-bottom:22px;}
.lfield{margin-bottom:13px;}
.lfield label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:#888;margin-bottom:4px;}
.lfield input{width:100%;padding:11px 13px;border:1.5px solid var(--border);
  border-radius:10px;font-size:14px;font-family:inherit;outline:none;transition:border-color .15s;}
.lfield input:focus{border-color:var(--teal);}
#login-error{background:var(--red-l);color:var(--red);border-radius:8px;
  padding:9px 12px;font-size:12px;margin-bottom:12px;display:none;}
.btn-primary{width:100%;padding:12px;background:linear-gradient(135deg,#1D9E75,#0F6E56);
  color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;
  cursor:pointer;font-family:inherit;margin-bottom:9px;}
.btn-google-l{width:100%;padding:11px;border:1.5px solid var(--border);background:#fff;
  border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;
  font-family:inherit;color:#444;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-google-l:hover{background:#fafafa;}
/* ─── Main layout ─── */
#main{display:none;}
.header{background:var(--slate);padding:0 22px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.h-brand{font-size:13px;font-weight:700;color:#fff;} .h-brand em{color:var(--teal);font-style:normal;}
.h-right{display:flex;align-items:center;gap:10px;font-size:11px;color:rgba(255,255,255,0.5);}
.btn-out{padding:5px 13px;border:1px solid rgba(255,255,255,0.2);border-radius:7px;
  background:transparent;color:rgba(255,255,255,0.5);cursor:pointer;font-size:10px;font-family:inherit;}
.btn-out:hover{color:#fff;border-color:rgba(255,255,255,0.4);}
.wrap{max-width:920px;margin:0 auto;padding:26px 16px;}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:18px;}
.stat{background:#fff;border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-lbl{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#aaa;margin-bottom:6px;}
.stat-num{font-size:28px;font-weight:800;}
.card{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:14px;}
.row{display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;}
.field{flex:1;min-width:140px;}
.field label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.05em;color:#888;margin-bottom:4px;}
.field input{width:100%;padding:9px 11px;border:1.5px solid var(--border);
  border-radius:9px;font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;}
.field input:focus{border-color:var(--teal);}
.btn-teal{padding:10px 18px;background:var(--teal);color:#fff;border:none;
  border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;}
.btn-teal:hover{background:var(--teal-d);}
.alert-box{padding:9px 13px;border-radius:9px;font-size:12px;margin-top:10px;
  display:none;line-height:1.5;}
.alert-box.show{display:block;}
.alert-box.ok{background:var(--teal-l);color:var(--teal-d);}
.alert-box.err{background:var(--red-l);color:var(--red);}
table{width:100%;border-collapse:collapse;font-size:12px;}
th{text-align:left;padding:8px 10px;font-size:10px;font-weight:700;letter-spacing:.06em;
  text-transform:uppercase;color:#bbb;border-bottom:1px solid var(--border);}
td{padding:10px 10px;border-bottom:1px solid var(--border);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
.av{width:28px;height:28px;border-radius:50%;background:var(--teal-l);display:inline-flex;
  align-items:center;justify-content:center;font-size:10px;font-weight:800;color:var(--teal-d);margin-right:8px;}
.badge{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700;}
.badge-ok{background:var(--teal-l);color:var(--teal-d);}
.badge-pend{background:#FFF8E1;color:#E65100;}
.badge-block{background:var(--red-l);color:var(--red);}
.btn-sm{padding:4px 10px;border:1px solid var(--border);border-radius:6px;
  font-size:11px;cursor:pointer;background:#fff;font-family:inherit;}
.btn-sm:hover{background:var(--bg);}
.empty{text-align:center;padding:32px;color:#bbb;font-size:13px;}
</style>
</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="login-overlay">
  <div class="login-box">
    <h2>🔐 Panel de Administrador</h2>
    <p>ENAR 2026 · Acceso exclusivo Dr. AJSV</p>
    <div id="login-error"></div>
    <div class="lfield">
      <label>Correo</label>
      <input type="email" id="adm-email" value="armadojoseventura@gmail.com" autocomplete="email">
    </div>
    <div class="lfield">
      <label>Contraseña</label>
      <input type="password" id="adm-pass" placeholder="Tu contraseña" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') admLogin()">
    </div>
    <button class="btn-primary" onclick="admLogin()" id="adm-btn">Entrar →</button>
    <button class="btn-google-l" onclick="admGoogle()">
      <svg width="16" height="16" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Entrar con Google
    </button>
  </div>
</div>

<!-- PANEL PRINCIPAL (oculto hasta que se autentique) -->
<div id="main">
  <div class="header">
    <div class="h-brand">ENAR 2026 · <em>Panel Admin</em></div>
    <div class="h-right">
      <span id="admin-name"></span>
      <button class="btn-out" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="wrap">
    <div class="grid4">
      <div class="stat"><div class="stat-lbl">Activos</div><div class="stat-num" id="n-active" style="color:var(--teal)">—</div></div>
      <div class="stat"><div class="stat-lbl">Pendientes</div><div class="stat-num" id="n-pend" style="color:#E65100">—</div></div>
      <div class="stat"><div class="stat-lbl">Bloqueados</div><div class="stat-num" id="n-block" style="color:var(--red)">—</div></div>
      <div class="stat"><div class="stat-lbl">Total</div><div class="stat-num" id="n-total">—</div></div>
    </div>

    <div class="card">
      <div class="card-title">➕ Dar acceso a nuevo comprador</div>
      <div class="row">
        <div class="field"><label>Nombre</label>
          <input type="text" id="new-name" placeholder="Dr. Juan Pérez"></div>
        <div class="field"><label>Correo electrónico</label>
          <input type="email" id="new-email" placeholder="correo@gmail.com"></div>
        <button class="btn-teal" onclick="addAccess()">Enviar acceso →</button>
      </div>
      <div class="alert-box" id="add-msg"></div>
    </div>

    <div class="card">
      <div class="card-title" style="display:flex;align-items:center;justify-content:space-between;">
        <span>👥 Usuarios registrados</span>
        <button class="btn-sm" onclick="loadUsers()">↻ Actualizar</button>
      </div>
      <table>
        <thead><tr>
          <th>Usuario</th><th>Correo</th><th>Estado</th><th>Registro</th><th>Acciones</th>
        </tr></thead>
        <tbody id="user-table"><tr><td colspan="5" class="empty">Cargando...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Firebase compat SDK (scripts normales, no módulos) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const ADMIN_EMAIL = "armadojoseventura@gmail.com";

firebase.initializeApp({
  apiKey:            "AIzaSyCSrFkPQ8t-CK0KiWNs9VZ_kAJCN01yeww",
  authDomain:        "enar-2026.firebaseapp.com",
  projectId:         "enar-2026",
  storageBucket:     "enar-2026.firebasestorage.app",
  messagingSenderId: "503924898282",
  appId:             "1:503924898282:web:79660ac202a880d3279a93"
});

const auth = firebase.auth();
const db   = firebase.firestore();

// ── AUTH STATE ────────────────────────────────────────────────
auth.onAuthStateChanged(function(user) {
  if (user && user.email === ADMIN_EMAIL) {
    // Admin autenticado → mostrar panel
    document.getElementById('login-overlay').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    document.getElementById('admin-name').textContent = user.displayName || user.email;
    loadUsers();
  } else if (user && user.email !== ADMIN_EMAIL) {
    // Cuenta equivocada → mostrar error y cerrar sesión
    showLoginError('⚠️ La cuenta ' + user.email + ' no es administrador. Usa ' + ADMIN_EMAIL);
    auth.signOut();
  } else {
    // No logueado → mostrar pantalla de login
    document.getElementById('login-overlay').style.display = 'flex';
    document.getElementById('main').style.display = 'none';
  }
});

// ── LOGIN CON EMAIL ───────────────────────────────────────────
function admLogin() {
  var email = document.getElementById('adm-email').value.trim();
  var pass  = document.getElementById('adm-pass').value;
  if (!email || !pass) { showLoginError('Ingresa correo y contraseña.'); return; }
  var btn = document.getElementById('adm-btn');
  btn.disabled = true;
  btn.textContent = 'Verificando...';
  auth.signInWithEmailAndPassword(email, pass)
    .catch(function(e) {
      var msg = e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password'
        ? 'Contraseña incorrecta.' : e.message;
      showLoginError('❌ ' + msg);
      btn.disabled = false;
      btn.textContent = 'Entrar →';
    });
}

// ── LOGIN CON GOOGLE ──────────────────────────────────────────
function admGoogle() {
  var provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(function(e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showLoginError('Error con Google: ' + e.message);
    }
  });
}

function showLoginError(msg) {
  var el = document.getElementById('login-error');
  el.textContent = msg;
  el.style.display = 'block';
}

// ── LOGOUT ────────────────────────────────────────────────────
function doLogout() {
  auth.signOut();
}

// ── CARGAR USUARIOS ───────────────────────────────────────────
function loadUsers() {
  var tb = document.getElementById('user-table');
  tb.innerHTML = '<tr><td colspan="5" class="empty">Cargando...</td></tr>';
  db.collection('enar_users').get()
    .then(function(snap) {
      var users = [];
      snap.forEach(function(d) { users.push(Object.assign({uid: d.id}, d.data())); });
      // Ordenar localmente por createdAt descendente
      users.sort(function(a, b) {
        var tA = a.createdAt ? (a.createdAt.seconds || 0) : 0;
        var tB = b.createdAt ? (b.createdAt.seconds || 0) : 0;
        return tB - tA;
      });
      var na = 0, np = 0, nb = 0;
      if (!users.length) {
        tb.innerHTML = '<tr><td colspan="5" class="empty">Aún no hay usuarios registrados.</td></tr>';
      } else {
        var rows = users.map(function(u) {
          // Estado: bloqueado > activo. emailVerified en Firestore puede estar
          // desactualizado; la verificación real ocurre en Firebase Auth.
          // Mostramos 'Activo' a todo usuario registrado que no esté bloqueado.
          var s  = u.blocked ? 'block' : 'ok';
          var sl = s === 'ok' ? 'Activo' : 'Bloqueado';
          if (s === 'ok') na++; else nb++;
          var date = u.createdAt ? new Date(u.createdAt.seconds*1000).toLocaleDateString('es-SV') : '—';
          var init = ((u.displayName||u.email||'?')).substring(0,2).toUpperCase();
          var actionBtn = u.blocked
            ? '<button class="btn-sm" style="color:var(--teal)" onclick="toggleBlock(\'' + u.uid + '\',false)">Desbloquear</button>'
            : '<button class="btn-sm" style="color:var(--red)" onclick="toggleBlock(\'' + u.uid + '\',true)">Bloquear</button>';
          return '<tr>'
            + '<td><span class="av">' + init + '</span>' + (u.displayName||'Sin nombre') + '</td>'
            + '<td>' + (u.email||'—') + '</td>'
            + '<td><span class="badge badge-' + s + '">' + sl + '</span></td>'
            + '<td>' + date + '</td>'
            + '<td style="display:flex;gap:6px;flex-wrap:wrap;">'
            +   '<button class="btn-sm" onclick="resetPwd(\'' + u.email + '\')">Enviar contraseña</button>'
            +   actionBtn
            + '</td>'
            + '</tr>';
        });
        tb.innerHTML = rows.join('');
      }
      document.getElementById('n-active').textContent = na;
      document.getElementById('n-pend').textContent   = np;
      document.getElementById('n-block').textContent  = nb;
      document.getElementById('n-total').textContent  = users.length;
    })
    .catch(function(e) {
      tb.innerHTML = '<tr><td colspan="5" class="empty" style="color:var(--red)">Error al cargar usuarios: ' + e.message + '</td></tr>';
    });
}

// ── DAR ACCESO ────────────────────────────────────────────────
function addAccess() {
  var name  = document.getElementById('new-name').value.trim();
  var email = document.getElementById('new-email').value.trim().toLowerCase();
  if (!email) { showAddMsg('err', 'Ingresa el correo del comprador.'); return; }

  var key = btoa(email).replace(/=/g,'');
  db.collection('enar_authorized').doc(key).set({
    email:        email,
    name:         name || '',
    authorizedAt: firebase.firestore.Timestamp.now(),
    authorizedBy: ADMIN_EMAIL
  }).then(function() {
    return auth.sendPasswordResetEmail(email, { url: window.location.origin + '/login.html' });
  }).then(function() {
    showAddMsg('ok', '✅ Acceso autorizado. Se envió un enlace a <strong>' + email + '</strong> para crear su contraseña.');
    document.getElementById('new-name').value  = '';
    document.getElementById('new-email').value = '';
    loadUsers();
  }).catch(function(e) {
    if (e.code === 'auth/user-not-found') {
      showAddMsg('ok', '✅ Correo autorizado: <strong>' + email + '</strong>. Cuando el comprador se registre con ese correo tendrá acceso. Envíale manualmente el link de registro.');
    } else {
      showAddMsg('err', 'Error: ' + e.message);
    }
  });
}

function resetPwd(email) {
  if (!confirm('¿Enviar correo de restablecimiento de contraseña a ' + email + '?')) return;
  auth.sendPasswordResetEmail(email)
    .then(function() { alert('✅ Correo enviado a ' + email); })
    .catch(function(e) { alert('Error: ' + e.message); });
}

function toggleBlock(uid, block) {
  if (!confirm(block ? '¿Bloquear el acceso de este usuario?' : '¿Restaurar el acceso?')) return;
  db.collection('enar_users').doc(uid).update({ blocked: block })
    .then(loadUsers)
    .catch(function(e) { alert('Error: ' + e.message); });
}

function showAddMsg(type, html) {
  var el = document.getElementById('add-msg');
  el.className = 'alert-box show ' + type;
  el.innerHTML = html;
}
</script>
</body>
</html>
